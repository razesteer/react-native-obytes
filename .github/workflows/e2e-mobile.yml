name: E2E Razesteer Maestro Tests Android (Maestro Cloud)

on:
  workflow_dispatch:   # manual trigger only

jobs:
  generate-and-test-apk:
    name: Generate and Test APK (Maestro Cloud)
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # Checkout repo
      # ----------------------------------------
      - name: 📦 Checkout project repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------
      # Node + PNPM + install dependencies
      # ----------------------------------------
      - name: 📦 Setup Node + PNPM + install deps
        uses: ./.github/actions/setup-node-pnpm-install

      # ----------------------------------------
      # Prebuild Native Projects (preview environment)
      # ----------------------------------------
      - name: 📦 Prebuild Native Projects (Preview)
        run: pnpm prebuild:preview

      # ----------------------------------------
      # Build Android Release APK
      # ----------------------------------------
      - name: 📦 Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
          cd ..

      # ----------------------------------------
      # Upload Release APK as artifact (optional)
      # ----------------------------------------
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: test-apk
          path: ./android/app/build/outputs/apk/release/app-release.apk

      # ----------------------------------------
      # Run Maestro Cloud E2E tests
      # ----------------------------------------
      - name: 📱 Run E2E Tests with Maestro Cloud
        uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: android/app/build/outputs/apk/release/app-release.apk
          app-id: com.obytes.preview   # ✅ FORCE OVERRIDE
          env: |
            APP_ID=com.obytes.preview
